<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheetCheater</title>
  </head>
  <body>
    <div id="toolbar" class="toolbar">
      <span class="toolbar-title">SheetCheater</span>
      <button id="edit-toggle" type="button">Edit</button>
      <button id="reset-btn" type="button" style="display: none">Reset</button>
      <button id="print-btn" type="button">Print</button>
      <span id="drop-hint" class="drop-hint">Drop a .md file anywhere to load it</span>
    </div>

    <div
      id="overflow-warning"
      style="
        display: none;
        position: fixed;
        top: 44px;
        left: 0;
        right: 0;
        background: #ef4444;
        color: white;
        text-align: center;
        padding: 8px;
        font-size: 14px;
        z-index: 50;
      "
    >
      Warning: content exceeds one A4 page. Consider removing content.
    </div>

    <div id="workspace" class="workspace">
      <div id="editor-pane" class="editor-pane" style="display: none">
        <textarea id="editor" class="editor" spellcheck="false"></textarea>
      </div>
      <div id="preview-pane" class="preview-pane">
        <div id="app"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

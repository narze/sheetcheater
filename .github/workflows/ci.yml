name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run tsc

      - name: Build web app
        run: bun run vp build

      - name: Build CLI
        run: bun run build:cli

      - name: Test CLI
        run: |
          node dist/cli.js example/git.md /tmp/test-output.html
          test -f /tmp/test-output.html
          node dist/cli.js example/docker.md /tmp/test-docker.html
          test -f /tmp/test-docker.html
